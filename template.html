<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>营销业务数据推演与诊断 - 智能多维度版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700;900&display=swap');
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background-color: #EEF3FA; color: #0D1B33; }
        .num-font { font-family: 'Roboto', sans-serif; }
        .hover-card { transition: all 0.3s ease; }
        .hover-card:hover { transform: translateY(-2px); box-shadow: 0 10px 20px -5px rgba(10, 40, 90, 0.1); }
        .fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .verdict-banner { background: #0C1A2E; }
        .vb-status-red { background: rgba(217,45,32,.25); border: 1px solid rgba(217,45,32,.5); color: #FCA5A5; }
        .vb-status-green { background: rgba(2,122,72,.25); border: 1px solid rgba(2,122,72,.5); color: #6CE9A6; }
        .vb-status-amber { background: rgba(181,71,8,.25); border: 1px solid rgba(181,71,8,.5); color: #FDE047; }
        .vb-status-gray { background: rgba(255,255,255,.1); border: 1px solid rgba(255,255,255,.2); color: #A0B6CC; }
        .pb-track { height: 6px; background: #EEF3FA; border-radius: 3px; position: relative; border: 1px solid #D8E6F3; }
        .pb-fill-red { background: linear-gradient(90deg, #D92D20, #F87171); height: 100%; border-radius: 3px; }
        .pb-fill-amber { background: linear-gradient(90deg, #B54708, #FBBF24); height: 100%; border-radius: 3px; }
        .pb-fill-green { background: linear-gradient(90deg, #027A48, #34D399); height: 100%; border-radius: 3px; }
        .pb-fill-blue { background: linear-gradient(90deg, #1549C3, #60A5FA); height: 100%; border-radius: 3px; }
        .bm-tick { position: absolute; top: -5px; bottom: -5px; width: 2px; background: rgba(0,0,0,.25); border-radius: 1px; }
        .f-arrow-box { text-align: center; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .f-rate-red { background: #FEF3F2; border: 1px solid #FDA29B; color: #D92D20; }
        .f-rate-green { background: #ECFDF3; border: 1px solid #6CE9A6; color: #027A48; }
        .ff-box { display: flex; flex-direction: column; align-items: center; padding: 8px 12px; border-radius: 6px; text-align: center; min-width: 90px; }
        .ff-r { background: #FEF3F2; border: 2px solid #FDA29B; } .ff-r .ff-val { color: #D92D20; }
        .ff-a { background: #FFFAEB; border: 1px solid #FEC84B; } .ff-a .ff-val { color: #B54708; }
        .ff-n { background: #FFF; border: 1px solid #D8E6F3; } .ff-n .ff-val { color: #344C6E; }
        .text-red { color: #D92D20; } .text-amber { color: #B54708; } .text-green { color: #027A48; } .text-blue { color: #1549C3; }
    </style>
</head>
<body class="p-6 md:p-10 max-w-[1360px] mx-auto">
    <div class="flex flex-col md:flex-row justify-between items-end mb-8 gap-4 border-b border-gray-200 pb-4">
        <div>
            <h1 class="text-3xl font-bold text-[#0D1B33] tracking-wide">营销业务数据推演与诊断</h1>
            <p class="text-gray-500 mt-2 text-sm flex items-center gap-3">
                <span id="displayTimeRange" class="bg-blue-50 text-blue-600 border border-blue-200 px-2 py-0.5 rounded text-xs font-bold">加载中...</span>
                <span>面向集团管理层 · AI 智能诊断版</span>
            </p>
        </div>
        <div class="flex space-x-4">
            <div class="flex flex-col">
                <label class="text-xs text-gray-500 mb-1 font-bold">年度切换</label>
                <select id="yearSelector" onchange="switchView()" class="block w-32 pl-3 pr-8 py-2 text-sm border-2 border-blue-100 rounded-md shadow-sm bg-white cursor-pointer hover-card focus:outline-none font-bold text-gray-700">
                    </select>
            </div>
            <div class="flex flex-col">
                <label class="text-xs text-gray-500 mb-1 font-bold">项目视图</label>
                <select id="projectSelector" onchange="switchView()" class="block w-56 pl-3 pr-8 py-2 text-sm border-2 border-blue-100 rounded-md shadow-sm bg-white cursor-pointer hover-card focus:outline-none font-bold text-gray-700">
                    <option value="global" selected>总体视图 (全盘大盘)</option>
                    </select>
            </div>
        </div>
    </div>
    <div id="dashboardContent" class="fade-in"></div>

    <script>
        function fmtStr(val) {
            if (val === 0 || val === '0' || val === null || val === undefined) return `<span class="text-gray-300">—</span>`;
            if (val === '负产出') return `<span class="text-red font-black">异常退签</span>`;
            return `<span class="num-font">${val}</span>`;
        }

        // ================= 数据占位符 =================
        // Python 后台会生成形如 {"2025": {...}, "2026": {...}} 的嵌套结构
        const db = {{ DATA_DICT_HERE }};

        let chartTrend1 = null, chartTrend2 = null, chartScatter = null;

        // 初始化网页
        window.onload = function() {
            const yearSelector = document.getElementById('yearSelector');
            const projectSelector = document.getElementById('projectSelector');

            // 1. 扫描 db 中所有的年份并填充下拉框
            const years = Object.keys(db).sort((a, b) => b - a); // 降序排
            years.forEach(y => {
                let opt = document.createElement('option');
                opt.value = y;
                opt.innerHTML = y + "年度";
                yearSelector.appendChild(opt);
            });

            // 2. 动态填充项目列表 (基于第一个年份的项目列表)
            if (years.length > 0) {
                const projects = Object.keys(db[years[0]]);
                projects.forEach(p => {
                    if (p !== 'global') {
                        let opt = document.createElement('option');
                        opt.value = p;
                        opt.innerHTML = p;
                        projectSelector.appendChild(opt);
                    }
                });
            }

            switchView();
        };

        function switchView() {
            const year = document.getElementById('yearSelector').value;
            const prj = document.getElementById('projectSelector').value;

            if (!db[year] || !db[year][prj]) {
                document.getElementById('dashboardContent').innerHTML = '<div class="text-center py-20 text-gray-400">该年度无此项目数据</div>';
                return;
            }

            const data = db[year][prj];
            const container = document.getElementById('dashboardContent');

            // 动态更新时间文案
            const latestMonth = data.trendData.months.length;
            document.getElementById('displayTimeRange').innerText = `${year}年 1-${latestMonth}月 累计`;

            container.classList.remove('fade-in');
            void container.offsetWidth;
            container.classList.add('fade-in');

            if (prj === 'global') {
                renderGlobalView(container, data, year);
            } else {
                renderProjectView(container, data, prj, year);
            }
        }

        // ================= UI 组件渲染 (省略部分未变动的 generate 函数以节省空间) =================
        // 注意：getSectionHeader, generateBanner, generateKPIHtml, generateFunnel, generateTrendHtml 逻辑保持不变

        function getSectionHeader(type, title) {
            const bg = type === 'WHAT' ? 'bg-[#1549C3]' : type === 'SO WHAT' ? 'bg-[#B54708]' : 'bg-[#027A48]';
            return `<div class="flex items-center gap-2 mb-4 border-b border-[#D8E6F3] pb-2 mt-4"><span class="text-[10px] font-black text-white ${bg} px-2 py-0.5 rounded tracking-wider">${type}</span><span class="text-[15px] font-bold text-[#0D1B33] tracking-wide">${title}</span></div>`;
        }

        function generateBanner(b) {
            return `<div class="verdict-banner rounded-[12px] p-6 md:p-8 mb-6 shadow-lg hover-card"><div class="inline-block px-3 py-1 rounded text-[11px] font-bold tracking-widest mb-3 ${b.statusClass}">${b.status}</div><h2 class="text-xl md:text-2xl font-bold text-white mb-2 leading-snug">${b.headline}</h2><p class="text-xs text-gray-400 tracking-wide">${b.sub}</p></div>`;
        }

        function generateKPIHtml(item) {
            let tc = item.trend === "up" ? "text-green" : item.trend === "alert" ? "text-red" : "text-gray-500";
            let html = `<div class="bg-white rounded-[10px] p-[18px] shadow-sm hover-card border-l-4 ${item.trend==='alert'?'border-red-500':item.trend==='up'?'border-green-600':'border-gray-300'}"><div class="text-[11px] text-[#6B8AAE] font-medium mb-1.5">${item.title}</div><div class="text-3xl font-black ${item.trend==='alert'?'text-red':'text-[#0D1B33]'} mb-2 tracking-tight">${fmtStr(item.value)}</div><div class="text-[11px] font-bold ${tc} mb-3 inline-block bg-gray-50 px-2 py-0.5 rounded">${item.subtext}</div>`;
            if (item.hasPb) { let bm = item.bm ? `<div class="bm-tick" style="left:${item.bm}%"></div><span class="absolute text-[9px] text-[#6B8AAE]" style="top:-16px;left:calc(${item.bm}% - 12px)">${item.bmLabel}</span>` : ''; html += `<div class="pt-2 border-t border-[#D8E6F3]"><div class="flex justify-between text-[10px] text-[#6B8AAE] mb-1"><span>vs ${item.pbTarget}</span><span class="font-bold ${item.trend==='alert'?'text-red':'text-gray-700'}">${item.pbVal}%</span></div><div class="pb-track"><div class="${item.pbColor}" style="width:${item.pbVal}%"></div>${bm}</div></div>`; }
            return html + `</div>`;
        }

        function generateFormulaChain(fd) {
            if(!fd) return '';
            let leakH = fd.diagnosis && fd.diagnosis.leakage ? fd.diagnosis.leakage.map(l => `<div class="mb-5 border-b border-gray-100 pb-3"><div class="flex justify-between items-center mb-2"><span class="text-[13px] font-bold text-[#344C6E]">${l.label}</span><span class="text-[16px] font-black text-red">${l.val}</span></div><div class="text-[12px] text-gray-500 leading-relaxed">${l.desc}</div></div>`).join('') : '';
            let levH = fd.diagnosis && fd.diagnosis.leverage ? `<div class="bg-[#EFF6FF] p-4 rounded-lg border border-[#93C5FD] text-[13px] text-[#1D4ED8] leading-relaxed mt-4"><div class="font-bold mb-2 flex items-center"><span class="mr-1 text-[16px]">💡</span> 破局杠杆测算</div>${fd.diagnosis.leverage}</div>` : '';

            const noteL1 = `<div class="ml-6 pl-4 border-l-2 border-gray-100 text-[11px] text-gray-400 hidden xl:block">// 结果定性：最终考核底线</div>`;
            const noteL2 = `<div class="ml-6 pl-4 border-l-2 border-gray-100 text-[11px] text-gray-400 hidden xl:block">// 效率诊断：资金流转折损</div>`;
            const noteL3 = `<div class="ml-6 pl-4 border-l-2 border-gray-100 text-[11px] text-gray-400 hidden xl:block">// 策略透视：量价平衡分析</div>`;

            let c = `<div class="flex flex-col gap-1 min-w-[600px] xl:min-w-[800px]">`;
            c += `<div class="flex items-center py-2 border-b border-gray-100"><div class="w-16 text-right pr-3 border-r-2 border-gray-200"><div class="text-[10px] font-bold text-gray-500">L1</div><div class="text-[9px] text-gray-400">实收</div></div><div class="px-3 text-gray-400 text-lg">=</div><div class="ff-box ${fd.l1.style}"><div class="font-black text-[14px] num-font">${fd.l1.val}</div><div class="text-[10px]">${fd.l1.lbl}</div></div>${noteL1}</div>`;
            c += `<div class="flex items-center py-2 border-b border-gray-100"><div class="w-16 text-right pr-3 border-r-2 border-gray-200"><div class="text-[10px] font-bold text-gray-500">L2</div><div class="text-[9px] text-gray-400">转化</div></div><div class="px-3 text-gray-400 text-lg">=</div><div class="flex gap-2"><div class="ff-box ${fd.l2_1.style}"><div class="font-black text-[14px]">${fd.l2_1.val}</div></div><div class="text-gray-400 text-lg">×</div><div class="ff-box ${fd.l2_2.style}"><div class="font-black text-[14px]">${fd.l2_2.val}</div></div></div>${noteL2}</div>`;
            c += `<div class="flex items-center py-2 border-b border-gray-100"><div class="w-16 text-right pr-3 border-r-2 border-gray-200"><div class="text-[10px] font-bold text-gray-500">L3</div><div class="text-[9px] text-gray-400">量价</div></div><div class="px-3 text-gray-400 text-lg">=</div><div class="flex gap-2 bg-gray-50 p-1 rounded-lg"><div class="ff-box ${fd.l3_1.style}"><div class="font-black text-[14px]">${fd.l3_1.val}</div></div><div class="text-gray-400 text-lg">×</div><div class="ff-box ${fd.l3_2.style}"><div class="font-black text-[14px]">${fd.l3_2.val}</div></div></div>${noteL3}</div>`;
            c += `</div>`;
            return `<div class="bg-white rounded-[10px] p-6 shadow-sm hover-card mb-8"><div class="flex flex-col lg:flex-row gap-6"><div class="lg:w-[72%] overflow-x-auto">${c}</div><div class="lg:w-[28%] border-t lg:border-t-0 lg:border-l border-gray-200 pt-4 lg:pt-0 lg:pl-8 flex flex-col justify-center"><div class="text-[15px] font-bold text-[#0D1B33] mb-5 flex items-center"><span class="bg-red-100 text-red-600 px-2 py-1 rounded text-[11px] mr-2">病灶定位</span> 价值漏损账单</div>${leakH || '<div class="text-gray-400 text-sm mb-4">— 暂无明确漏洞 —</div>'}${levH}</div></div></div>`;
        }

        function generateTrendHtml(td, year) {
            let ih = '';
            if(td && td.insights && td.insights.length > 0) { ih = `<div class="mt-5 bg-[#FFFAEB] border border-[#FEC84B] rounded-[8px] p-5 mx-2"><div class="text-[14px] font-bold text-[#B54708] mb-3 flex items-center"><span class="mr-1 text-[16px]">💡</span> ${year}年度 异动智能解析</div><ul class="space-y-2">${td.insights.map(i => `<li class="text-[13px] text-[#7A2E0E] leading-relaxed relative pl-4 before:content-[''] before:absolute before:left-0 before:top-[7px] before:w-1.5 before:h-1.5 before:bg-[#B54708] before:rounded-full">${i}</li>`).join('')}</ul></div>`; }
            return `<div class="bg-white rounded-[10px] p-6 shadow-sm hover-card mb-8"><div class="grid grid-cols-1 lg:grid-cols-2 gap-6"><div><div class="text-[12px] font-bold text-[#344C6E] mb-1">${year} 资金回款趋势 (万元)</div><div id="chartTrend1" style="height: 240px; width: 100%;"></div></div><div><div class="text-[12px] font-bold text-[#344C6E] mb-1">${year} 签约套数预警</div><div id="chartTrend2" style="height: 240px; width: 100%;"></div></div></div>${ih}</div>`;
        }

        // ================= 视图渲染逻辑 =================
        function renderGlobalView(container, data, year) {
            container.innerHTML = `
                ${getSectionHeader('WHAT', `${year} 大盘核心现状`)}
                ${generateBanner(data.banner)}
                <div class="grid grid-cols-1 md:grid-cols-4 gap-[14px] mb-[28px]">${data.kpi.map(item => generateKPIHtml(item)).join('')}</div>
                ${getSectionHeader('SO WHAT', '公式推演与漏损账单')}
                ${generateFormulaChain(data.formulaData)}
                ${getSectionHeader('SO WHAT', '年度走势雷达')}
                ${generateTrendHtml(data.trendData, year)}
            `;
            setTimeout(() => { initTrendCharts(data.trendData); }, 100);
        }

        function renderProjectView(container, data, projectName, year) {
            container.innerHTML = `
                ${getSectionHeader('WHAT', `${projectName} (${year}) 核心洞察`)}
                ${generateBanner(data.banner)}
                <div class="grid grid-cols-1 md:grid-cols-4 gap-[14px] mb-[28px]">${data.kpi.map(item => generateKPIHtml(item)).join('')}</div>
                ${getSectionHeader('SO WHAT', '业务公式推演')}
                ${generateFormulaChain(data.formulaData)}
                ${getSectionHeader('SO WHAT', '月度异动监测')}
                ${generateTrendHtml(data.trendData, year)}
            `;
            setTimeout(() => { initTrendCharts(data.trendData); }, 100);
        }

        function initTrendCharts(tData) {
            if(chartTrend1) chartTrend1.dispose();
            if(chartTrend2) chartTrend2.dispose();
            if(!tData || !tData.months) return;

            chartTrend1 = echarts.init(document.getElementById('chartTrend1'));
            chartTrend1.setOption({ grid: { top: 30, bottom: 25, left: 45, right: 15 }, tooltip: { trigger: 'axis' }, xAxis: { type: 'category', data: tData.months, axisLabel: { fontSize: 10 } }, yAxis: { type: 'value', axisLabel: { fontSize: 10 } }, series: [ { name: '实际', type: 'line', data: tData.actualCollection, symbolSize: 6, itemStyle: { color: '#D92D20' }, lineStyle: { width: 2.5 } }, { name: '计划', type: 'line', data: tData.planCollection, lineStyle: { type: 'dashed', opacity: 0.5 } } ] });

            chartTrend2 = echarts.init(document.getElementById('chartTrend2'));
            chartTrend2.setOption({ grid: { top: 30, bottom: 25, left: 35, right: 15 }, tooltip: { trigger: 'axis' }, xAxis: { type: 'category', data: tData.months, axisLabel: { fontSize: 10 } }, yAxis: { type: 'value', axisLabel: { fontSize: 10 } }, series: [ { name: '套数', type: 'bar', data: tData.actualUnits, barWidth: '40%', itemStyle: { color: p => p.value < 0 ? '#D92D20' : '#027A48' } } ] });
        }

        window.addEventListener('resize', function() { if(chartTrend1) chartTrend1.resize(); if(chartTrend2) chartTrend2.resize(); });
    </script>
</body>
</html>
