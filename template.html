<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>营销业务数据推演与诊断 - 修复版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #EEF3FA; color: #0D1B33; }
        .num-font { font-family: system-ui, sans-serif; }
        .hover-card { transition: all 0.3s ease; }
        .hover-card:hover { transform: translateY(-2px); box-shadow: 0 10px 20px -5px rgba(10,40,90,0.1); }
        .fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
        .verdict-banner { background: #0C1A2E; }
        .vb-status-red { background: rgba(217,45,32,.25); border:1px solid rgba(217,45,32,.5); color:#FCA5A5; }
        .vb-status-green { background: rgba(2,122,72,.25); border:1px solid rgba(2,122,72,.5); color:#6CE9A6; }
        .vb-status-amber { background: rgba(181,71,8,.25); border:1px solid rgba(181,71,8,.5); color:#FDE047; }
        .vb-status-gray { background: rgba(255,255,255,.1); border:1px solid rgba(255,255,255,.2); color:#A0B6CC; }
        .pb-track { height:6px; background:#EEF3FA; border-radius:3px; border:1px solid #D8E6F3; }
        .pb-fill-blue { background:linear-gradient(90deg,#1549C3,#60A5FA); height:100%; border-radius:3px; }
        .chart-container { width:100%; height:400px; margin:10px 0; }
        .text-red { color:#D92D20; }
    </style>
</head>
<body class="p-6 md:p-10 max-w-[1360px] mx-auto">
    <div class="flex flex-col md:flex-row justify-between items-end mb-8 gap-4 border-b border-gray-200 pb-4">
        <div>
            <h1 class="text-3xl font-bold text-[#0D1B33]">营销业务健康度诊断与推演</h1>
            <p class="text-gray-500 text-sm mt-2">
                <span id="displayTimeRange" class="bg-blue-50 text-blue-600 px-2 py-0.5 rounded text-xs font-bold">加载中...</span>
            </p>
        </div>
        <div class="flex space-x-4">
            <div>
                <label class="text-xs text-gray-500 font-bold">年度</label>
                <select id="yearSelector" onchange="updateProjectsAndSwitch()" class="w-32 border-2 rounded p-2"></select>
            </div>
            <div>
                <label class="text-xs text-gray-500 font-bold">项目</label>
                <select id="projectSelector" onchange="switchView()" class="w-56 border-2 rounded p-2"></select>
            </div>
        </div>
    </div>

    <div id="dashboardContent" class="fade-in"></div>

    <script>
        const db = {{ DATA_DICT_HERE }};
        let chartTrend1, chartTrend2;

        function fmtStr(v) {
            if(!v || v === 0) return '<span class="text-gray-300">—</span>';
            return `<span class="num-font">${v}</span>`;
        }

        function updateProjectsAndSwitch() {
            const year = document.getElementById('yearSelector').value;
            const sel = document.getElementById('projectSelector');
            sel.innerHTML = '';
            if(db[year]) {
                Object.keys(db[year]).forEach(p => {
                    const opt = document.createElement('option');
                    opt.value = p;
                    opt.textContent = p === 'global' ? '总体大盘' : p;
                    sel.appendChild(opt);
                });
            }
            switchView();
        }

        function renderProjectView(container, data, prj, year) {
            container.innerHTML = '';
            container.innerHTML += generateBanner(data.banner);

            container.innerHTML += `<div class="my-4 font-bold text-lg">📊 核心指标</div>`;
            const kpiDiv = document.createElement('div');
            kpiDiv.className = 'grid grid-cols-1 md:grid-cols-4 gap-4 mb-6';
            data.kpi.forEach(k => kpiDiv.innerHTML += generateKPIHtml(k));
            container.appendChild(kpiDiv);

            container.innerHTML += `<div class="my-4 font-bold text-lg">🧩 转化漏斗</div>`;
            const funnelDiv = document.createElement('div');
            funnelDiv.className = 'bg-white p-4 rounded shadow mb-6';
            funnelDiv.innerHTML = generateFunnel(data.funnel);
            container.appendChild(funnelDiv);

            container.innerHTML += `<div class="my-4 font-bold text-lg">🔍 AI 诊断</div>`;
            const formulaDiv = document.createElement('div');
            formulaDiv.className = 'bg-white p-4 rounded shadow mb-6';
            formulaDiv.innerHTML = generateFormulaChain(data.formulaData);
            container.appendChild(formulaDiv);

            const chart1 = document.createElement('div');
            chart1.className = 'chart-container';
            container.appendChild(chart1);
            chartTrend1 = echarts.init(chart1);
            chartTrend1.setOption({
                xAxis: { data: data.trendData.months },
                yAxis: { type: 'value' },
                series: [
                    { name: '实收', type: 'bar', data: data.trendData.actualCollection },
                    { name: '计划', type: 'line', data: data.trendData.planCollection }
                ]
            });

            const chart2 = document.createElement('div');
            chart2.className = 'chart-container';
            container.appendChild(chart2);
            chartTrend2 = echarts.init(chart2);
            chartTrend2.setOption({
                xAxis: { data: data.trendData.months },
                yAxis: { type: 'value' },
                series: [
                    { name: '签约', type: 'bar', data: data.trendData.actualUnits },
                    { name: '目标', type: 'line', data: data.trendData.targetUnits }
                ]
            });

            container.innerHTML += `<div class="my-4 font-bold text-lg">✅ 行动建议</div>`;
            const actDiv = document.createElement('div');
            actDiv.className = 'bg-white p-4 rounded shadow';
            data.actions.forEach(a => {
                actDiv.innerHTML += `<div class="p-2 border-b">${a[0]} ${a[1]} ${a[2]}：${a[3]}</div>`;
            });
            container.appendChild(actDiv);
        }

        function switchView() {
            const year = document.getElementById('yearSelector').value;
            const prj = document.getElementById('projectSelector').value;
            const data = db[year][prj];
            const container = document.getElementById('dashboardContent');

            document.getElementById('displayTimeRange').innerText = `${year}年`;
            renderProjectView(container, data, prj, year);
        }

        function generateBanner(b) {
            return `<div class="verdict-banner p-6 rounded shadow mb-6 text-white">
                <div class="${b.statusClass} inline-block px-2 py-1 rounded text-xs mb-2">${b.status}</div>
                <h2 class="text-xl font-bold">${b.headline}</h2>
                <p class="text-gray-400 text-xs">${b.sub}</p></div>`;
        }

        function generateKPIHtml(item) {
            return `<div class="bg-white p-4 rounded shadow hover-card">
                <div class="text-xs text-gray-500">${item.title}</div>
                <div class="text-2xl font-bold my-2">${fmtStr(item.value)}</div>
                <div class="text-xs">${item.subtext}</div></div>`;
        }

        function generateFunnel(f) {
            return `<div class="flex justify-between items-center overflow-x-auto">
                <div class="text-center">${f.s1.val}<br><small>${f.s1.lbl}</small></div>
                <div class="text-center">→<br>${f.c1.rate}</div>
                <div class="text-center">${f.s2.val}<br><small>${f.s2.lbl}</small></div>
                <div class="text-center">→<br>${f.c2.rate}</div>
                <div class="text-center">${f.s3.val}<br><small>${f.s3.lbl}</small></div>
                <div class="text-center">→<br>${f.c3.rate}</div>
                <div class="text-center">${f.s4.val}<br><small>${f.s4.lbl}</small></div>
            </div>`;
        }

        // 🔥 100% 修复 map 报错 & function sub()
        function generateFormulaChain(fd) {
            if(!fd) return '<div>暂无诊断数据</div>';

            let leakage = [];
            if(fd.diagnosis && Array.isArray(fd.diagnosis.leakage)) {
                leakage = fd.diagnosis.leakage;
            }

            let leakHtml = '';
            leakage.forEach(l => {
                leakHtml += `<div class="mb-2"><b>${l.label || '-'}</b>：${l.desc || '无说明'}</div>`;
            });

            let leverage = fd.diagnosis?.leverage || '暂无建议';
            return `<div><div class="text-red">${leakHtml}</div><div class="mt-4">💡 ${leverage}</div></div>`;
        }

        window.onload = function() {
            const yearSel = document.getElementById('yearSelector');
            Object.keys(db).forEach(y => {
                const opt = document.createElement('option');
                opt.value = y;
                opt.textContent = y + '年';
                yearSel.appendChild(opt);
            });
            yearSel.onchange();
        }
    </script>
</body>
</html>
